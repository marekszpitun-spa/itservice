# =============================================================================
# IT Ticket Auto-Router — Control Panel
# -----------------------------------------------------------------------------
# This is the ONLY file you normally need to edit.
# Change a percentage, a skill, or pause the agent here, then commit.
# The routine reads this file fresh on every run.
# =============================================================================

# --- Kill switch -------------------------------------------------------------
# Set to false to pause ALL assignment immediately on the next run.
# (The agent checks this first and does nothing else if false.)
enabled: true

# --- When the agent is allowed to act ----------------------------------------
# The routine fires hourly; these bounds make it act only in business hours.
business_hours:
  timezone: "Europe/Berlin"
  start_hour: 8          # first hour it may act (08:00)
  end_hour: 17           # last hour it may act (17:00)
  active_days: [Mon, Tue, Wed, Thu, Fri]

# --- Jira scope --------------------------------------------------------------
jira:
  project_key: "SPAITSM"                       # <-- CONFIRM: IT / ITSUP / etc.
  # Tickets considered "needs assignment" — adjust if your workflow differs.
  unassigned_jql: 'project = {project_key} AND assignee IS EMPTY AND statusCategory NOT IN (CANCELLED, RESOLVED, DONE)'
  # How current workload is measured when balancing toward targets.
  # "open" = count each person's not-Done tickets in this project.
  load_basis: "open"

# --- Assignment strategy -----------------------------------------------------
# load_balanced  : among skill-eligible people, pick whoever is FURTHEST below
#                  their target_pct share right now. Drives real distribution
#                  toward your targets and is fully explainable. (recommended)
# weighted_random: pick randomly, weighted by target_pct. Simpler, drifts more.
strategy: "load_balanced"

# What to do when a ticket matches NO ONE's skills:
#   fallback_to_all = true  -> route by percentage among the whole team
#   fallback_to_all = false -> leave unassigned, flag it in the run summary
fallback_to_all: true

# --- Team --------------------------------------------------------------------
# target_pct values should sum to 100. The agent warns if they don't.
# account_id: Atlassian accountId (NOT display name). See README for how to get these.
